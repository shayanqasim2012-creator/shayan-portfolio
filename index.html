<!DOCTYPE html>
<html>
<head>
  <title>Shayan Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 420px;
      margin: auto;
      margin-top: 60px;
      padding: 20px;
    }

    .card {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    h1 {
      color: #00bfff;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      line-height: 1.5;
    }

    .tag {
      display: inline-block;
      padding: 5px 10px;
      border: 1px solid #00bfff;
      border-radius: 20px;
      font-size: 12px;
      color: #00bfff;
      margin-bottom: 10px;
    }

    .project {
      background: #333;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      text-align: left;
    }

    button {
      padding: 12px 20px;
      background: #00bfff;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      margin-top: 15px;
    }

    button:hover {
      background: #008fcc;
    }

    /* Floating WhatsApp */
    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #00bfff;
      color: white;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      font-size: 24px;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="card">

      <h1>Hi, I'm Shayan 👋</h1>

      <div class="tag">Frontend Web Developer</div>

      <p>I build clean and responsive websites using HTML, CSS, and JavaScript.</p>

      <h3>Skills</h3>
      <p>HTML • CSS • JavaScript</p>

      <h3>Projects</h3>

      <div class="project">✔ Portfolio Website</div>
      <div class="project">✔ Landing Page</div>

      <button onclick="openWhatsApp()">Hire Me on WhatsApp</button>

    </div>

  </div>

  <!-- Floating WhatsApp Button -->
  <a class="whatsapp" href="https://wa.me/971567332672" target="_blank">💬</a>

  <script>
    function openWhatsApp() {
      window.open("https://wa.me/971567332672", "_blank");
    }
  </script>

</body>
</html>
